<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Lazy Loco</title>
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    
    <div id="ui-layer">
      <div id="camera-controls" style="align-items: center;">
        <button id="cam-prev" class="cam-btn" title="Previous Camera" style="display: flex; align-items: center; justify-content: center; width: 44px; padding: 0;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div id="cam-indicator" title="Camera 1/5" style="color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; box-sizing: border-box;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
        </div>
        <button id="cam-next" class="cam-btn" title="Next Camera" style="display: flex; align-items: center; justify-content: center; width: 44px; padding: 0;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>

      <div id="train-features">
        <button id="door-btn" class="cam-btn" title="Toggle Doors" style="display: flex; align-items: center; justify-content: center; width: 44px; padding: 0;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="M4 21V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v16" /><path d="M12 3v18" /><path d="M2 21h20" /></svg>
        </button>
      </div>
      <div id="horn-container" style="position: absolute; right: 2rem; top: calc(50% - 180px); background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; padding: 0.5rem; pointer-events: auto; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);">
        <button id="horn-btn" class="cam-btn" title="Sound Horn" style="display: flex; align-items: center; justify-content: center; width: 44px; padding: 0;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        </button>
      </div>

      <div class="controls">
        <div class="slider-container">
          <input type="range" id="throttle" min="-1" max="1" step="0.2" value="0">
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
