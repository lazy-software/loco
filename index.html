<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Train Simulator PWA</title>
    <meta name="theme-color" content="#000000" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    
    <div id="ui-layer">
      <div id="camera-controls">
        <button class="cam-btn active" data-cam="0" title="Left Chase">🚁 L</button>
        <button class="cam-btn" data-cam="1" title="Left Platform">🚉 L</button>
        <button class="cam-btn" data-cam="2" title="Engine">🚂 F</button>
        <button class="cam-btn" data-cam="3" title="Right Platform">🚉 R</button>
        <button class="cam-btn" data-cam="4" title="Right Chase">🚁 R</button>
      </div>

      <div id="train-features">
        <button id="door-btn" class="cam-btn" title="Toggle Doors" style="display: flex; align-items: center; justify-content: center; width: 44px; padding: 0;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="M4 21V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v16" /><path d="M12 3v18" /><path d="M2 21h20" /></svg>
        </button>
      </div>
      <div class="controls">
        <label>F</label>
        <div class="slider-container">
          <input type="range" id="throttle" min="-1" max="1" step="0.2" value="0">
        </div>
        <label>R</label>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
